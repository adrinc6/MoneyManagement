<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Gastos</title>
    <!-- Tailwind CSS (Gratis y moderno) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js para gráficos interactivos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- Tarjeta Principal estilo App de Móvil -->
    <main class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden p-6 space-y-6">
        
        <!-- Cabecera Estética -->
        <div class="bg-gradient-to-tr from-emerald-500 to-teal-600 text-white p-6 rounded-2xl text-center shadow-md">
            <p class="text-xs opacity-90 uppercase tracking-widest font-semibold">Total Gastado (Ejemplo)</p>
            <h1 class="text-4xl font-black mt-1">280,00 €</h1>
        </div>

        <!-- Formulario Inserción -->
        <form id="formGasto" class="space-y-4">
            <h2 class="text-lg font-bold text-gray-800">Registrar Gasto</h2>
            
            <div class="space-y-3">
                <input type="text" id="concepto" required placeholder="¿En qué has gastado?" 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                
                <div class="flex gap-2">
                    <input type="number" id="cantidad" required step="0.01" placeholder="0.00 €" 
                        class="w-1/2 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                    
                    <select id="categoria" 
                        class="w-1/2 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-gray-600">
                        <option value="Comida">🛒 Comida</option>
                        <option value="Ocio">🍿 Ocio</option>
                        <option value="Transporte">🚗 Transporte</option>
                        <option value="Facturas">💡 Facturas</option>
                    </select>
                </div>

                <button type="submit" id="btnGuardar"
                    class="w-full bg-gray-900 text-white font-semibold py-3 rounded-xl hover:bg-gray-800 active:scale-98 transition-all shadow-sm cursor-pointer">
                    Guardar en Google Sheets
                </button>
            </div>
        </form>

        <!-- Gráfico Interactivo de Rosquilla -->
        <section class="space-y-3">
            <h2 class="text-lg font-bold text-gray-800">Distribución del mes</h2>
            <div class="p-4 bg-gray-50 rounded-2xl flex justify-center">
                <div class="w-11/12">
                    <canvas id="graficoGastos"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Cambia esto por TU URL de Google Apps Script
        const URL_DE_TU_SCRIPT = "TU_URL_DE_APPS_SCRIPT_AQUÍ";

        // Inicializar el Gráfico con datos visuales de prueba
        const ctx = document.getElementById('graficoGastos').getContext('2d');
        const miGrafico = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Comida', 'Ocio', 'Transporte', 'Facturas'],
                datasets: [{
                    data: [120, 50, 30, 80], // Puedes cambiar estos números base si quieres
                    backgroundColor: ['#10b981', '#f59e0b', '#3b82f6', '#ef4444'],
                    borderWidth: 4,
                    borderColor: '#ffffff'
                }]
            },
            options: { 
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 13 } } } },
                cutout: '70%'
            }
        });

        // Enviar datos al Excel al pulsar el botón
        document.getElementById('formGasto').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnGuardar');
            const concepto = document.getElementById('concepto').value;
            const cantidad = document.getElementById('cantidad').value;
            const categoria = document.getElementById('categoria').value;

            btn.disabled = true;
            btn.innerText = "Guardando...";

            try {
                // Envío nativo de datos a tu Google Script sin intermediarios
                await fetch(URL_DE_TU_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors', // Evita problemas de seguridad del navegador
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ concepto, cantidad, categoria })
                });

                alert("¡Gasto guardado en tu Google Sheets!");
                document.getElementById('formGasto').reset();
            } catch (error) {
                alert("Error al guardar el gasto.");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar en Google Sheets";
            }
        });
    </script>
</body>
</html>
