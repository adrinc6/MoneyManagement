name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Syntax check (app.js, sw.js)
        run: npm run check
      - name: Unit tests
        run: npm test
      - name: Lint (archivos nuevos)
        run: npm run lint
